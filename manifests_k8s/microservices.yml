apiVersion: apps/v1 
kind: Deployment
metadata:
  labels:
    run: session-service
  name: session-service
spec: 
  replicas: 1
  selector:
    matchLabels:
      run: session-service
  template:
    metadata:
      labels:
        run: session-service
    spec: 
      containers:
      - image: dorothag/session-service:arm 
        name: session-service
        ports:
        - containerPort: 8081
        env:
            # берутся переменные окружения из configMap
          - name: POSTGRES_HOST
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: POSTGRES_HOST
          - name: POSTGRES_PORT
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: POSTGRES_PORT
          - name: POSTGRES_DB
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: POSTGRES_DB_SESSION
          - name: JAVA_OPTS
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: JAVA_OPTS
            # берутся переменные окружения (cекреты) из secrets
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: POSTGRES_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: POSTGRES_PASSWORD
              
