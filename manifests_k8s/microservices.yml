apiVersion: apps/v1 
kind: Deployment
metadata:
  labels:
    run: gateway-service
  name: gateway-service
spec: 
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      run: gateway-service
  template:
    metadata:
      labels:
        run: gateway-service
    spec: 
      containers:
      - image: dorothag/gateway-service:arm 
        name: gateway-service
        ports:
        - containerPort: 8087
        env:
          - name: HOTEL_SERVICE_HOST
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: HOTEL_SERVICE_HOST
          - name: HOTEL_SERVICE_PORT
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: HOTEL_SERVICE_PORT
          - name: LOYALTY_SERVICE_HOST
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: LOYALTY_SERVICE_HOST
          - name: LOYALTY_SERVICE_PORT
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: LOYALTY_SERVICE_PORT
          - name: SESSION_SERVICE_HOST
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: SESSION_SERVICE_HOST
          - name: SESSION_SERVICE_PORT
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: SESSION_SERVICE_PORT
          - name: BOOKING_SERVICE_HOST
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: BOOKING_SERVICE_HOST
          - name: BOOKING_SERVICE_PORT
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: BOOKING_SERVICE_PORT
          - name: PAYMENT_SERVICE_HOST
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: PAYMENT_SERVICE_HOST
          - name: PAYMENT_SERVICE_PORT
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: PAYMENT_SERVICE_PORT
          - name: REPORT_SERVICE_HOST
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: REPORT_SERVICE_HOST
          - name: REPORT_SERVICE_PORT
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: REPORT_SERVICE_PORT



