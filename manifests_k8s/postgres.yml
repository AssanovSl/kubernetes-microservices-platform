
# Объект PV предоставляет хранилище. 

apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
spec:
  capacity:
    storage: 2Gi  
  accessModes:
    - ReadWriteOnce   
  persistentVolumeReclaimPolicy: Retain   
  storageClassName: manual   
  hostPath:
    path: /data/postgres   
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker01   
---
# Объект PVС запрашивает и резервирует хранилище. 

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: app
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual   
  volumeName: postgres-pv   
  resources:
    requests:
      storage: 1Gi   

---

apiVersion: apps/v1 
kind: Deployment
metadata:
  labels:
    run: postgres
  name: postgres
spec: 
  replicas: 1
  selector:
    matchLabels:
      run: postgres
  template:
    metadata:
      labels:
        run: postgres
    spec: 
      containers:
      - image: dorothag/database:arm 
        name: postgres
        ports:
        - containerPort: 5432
        env:
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: POSTGRES_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: POSTGRES_PASSWORD
        volumeMounts:
          - name: postgres-storage
            mountPath: /var/lib/postgresql/data
      
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
      

---

apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    run: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432